name: Android Release Artifacts (Manual)

on:
  workflow_dispatch:
    inputs:
      build_aab:
        description: 'Build and upload AAB artifacts (requires signing setup)'
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  android-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      - name: Build release APKs (split per ABI)
        run: npm run mobile:android:build:release:apk:split

      - name: Build release AABs (split per ABI)
        if: ${{ inputs.build_aab }}
        run: npm run mobile:android:build:release:aab:split

      - name: Upload release APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-release-split
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk

      - name: Upload release AAB artifacts
        if: ${{ inputs.build_aab }}
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-release-split
          path: |
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
